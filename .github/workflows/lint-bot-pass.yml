---
on:
  pull_request_target:
    branches:
      - main

name: Lint (bot pass)

permissions: {}

jobs:
  pre-commit:
    name: pre-commit
    if: |
      github.actor == 'github-actions[bot]' ||
      github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Bot PR — pre-commit skipped"
