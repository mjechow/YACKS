---
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

name: Lint

permissions: {}

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: pre-commit/action@v3.0.1
