---
on:
  push:
    branches:
      - main
      - release-please--**
  pull_request:
    branches:
      - main

concurrency:
  group: lint-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

name: Lint

permissions: {}

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: pre-commit/action@v3.0.1
