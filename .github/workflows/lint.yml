---
on:
  push:
    branches:
      - main
      - release-please--**
  pull_request:
    branches:
      - main

name: Lint

permissions: {}

jobs:
  pre-commit:
    name: pre-commit
    if: "!startsWith(github.head_ref, 'release-please--')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: pre-commit/action@v3.0.1
